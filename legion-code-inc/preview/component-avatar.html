<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-sans);}
.card{padding:20px 24px;}
.cap{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-tertiary);margin-bottom:14px;}
</style></head><body><div class="card">
    <div class="cap">Avatar · separator · scrollbar</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;">
      <div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
          <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#2A2E37,#1C1F26);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--text-primary);">JC</div>
          <div style="width:28px;height:28px;border-radius:50%;background:var(--bg-elevated);border:1px solid var(--border-default);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);">AK</div>
          <div style="width:28px;height:28px;border-radius:50%;background:var(--bg-elevated);border:1px solid var(--border-default);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);">+3</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="position:relative;width:32px;height:32px;border-radius:50%;background:var(--bg-elevated);border:1px solid var(--border-default);display:flex;align-items:center;justify-content:center;color:var(--text-secondary);">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="5" r="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M2.5 12 C3 9 5 8 7 8 C9 8 11 9 11.5 12" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
            <span style="position:absolute;right:-1px;bottom:-1px;width:10px;height:10px;border-radius:50%;background:var(--brand-primary);border:2px solid var(--bg-canvas);"></span>
          </div>
          <span style="font-size:12px;color:var(--text-secondary);">Online — Jamie Chen</span>
        </div>
      </div>
      <div>
        <div style="font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-tertiary);margin-bottom:8px;">Separator</div>
        <div style="background:var(--bg-elevated);border:1px solid var(--border-default);border-radius:var(--radius-md);overflow:hidden;">
          <div style="padding:10px 14px;font-size:13px;color:var(--text-primary);">Scan settings</div>
          <div style="height:1px;background:var(--border-subtle);"></div>
          <div style="padding:10px 14px;font-size:13px;color:var(--text-secondary);">Notifications</div>
        </div>
        <div style="margin-top:14px;height:80px;background:var(--bg-elevated);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:10px 14px;font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary);overflow:hidden;position:relative;">
          findings/critical.json<br>findings/warning.json<br>findings/info.json<br>findings/index.json<br>signature.bin
          <div style="position:absolute;right:4px;top:6px;width:3px;height:36px;background:var(--border-strong);border-radius:2px;"></div>
        </div>
      </div>
    </div>
  </div></body></html>
