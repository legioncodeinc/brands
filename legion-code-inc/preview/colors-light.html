<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-sans);}
.card{padding:20px 24px;}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:stretch;}
.sw{flex:1;min-width:0;border-radius:var(--radius-md);border:1px solid var(--border-default);overflow:hidden;background:var(--bg-elevated);}
.sw-fill{height:64px;border-bottom:1px solid var(--border-subtle);}
.sw-meta{padding:8px 10px;}
.sw-name{font-family:var(--font-mono);font-size:11px;color:var(--text-primary);font-weight:500;}
.sw-hex{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);margin-top:2px;}
.cap{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-tertiary);margin-bottom:10px;}
</style></head><body><div class="card">
    <div class="cap">Light theme · signed PDF report only</div>
    <div style="background:#FFFFFF;border-radius:var(--radius-md);border:1px solid var(--border-default);padding:14px;">
      <div class="row">
        <div class="sw" style="background:#FAFAFB;border:1px solid #D8DCE2;"><div class="sw-fill" style="background:#FFFFFF;border-bottom-color:#ECEEF1"></div><div class="sw-meta"><div class="sw-name" style="color:#0A0B0D">bg.canvas</div><div class="sw-hex" style="color:#6B7280">#FFFFFF</div></div></div>
        <div class="sw" style="background:#FAFAFB;border:1px solid #D8DCE2;"><div class="sw-fill" style="background:#F4F5F7;border-bottom-color:#ECEEF1"></div><div class="sw-meta"><div class="sw-name" style="color:#0A0B0D">bg.elevated</div><div class="sw-hex" style="color:#6B7280">#F4F5F7</div></div></div>
        <div class="sw" style="background:#FAFAFB;border:1px solid #D8DCE2;"><div class="sw-fill" style="background:#18A968"></div><div class="sw-meta"><div class="sw-name" style="color:#0A0B0D">brand.primary</div><div class="sw-hex" style="color:#6B7280">#18A968</div></div></div>
        <div class="sw" style="background:#FAFAFB;border:1px solid #D8DCE2;"><div class="sw-fill" style="background:#DC2839"></div><div class="sw-meta"><div class="sw-name" style="color:#0A0B0D">severity.critical</div><div class="sw-hex" style="color:#6B7280">#DC2839</div></div></div>
        <div class="sw" style="background:#FAFAFB;border:1px solid #D8DCE2;"><div class="sw-fill" style="background:#C77A00"></div><div class="sw-meta"><div class="sw-name" style="color:#0A0B0D">severity.warning</div><div class="sw-hex" style="color:#6B7280">#C77A00</div></div></div>
      </div>
    </div>
  </div></body></html>
