<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-sans);}
.card{padding:20px 24px;}
.cap{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-tertiary);margin-bottom:14px;}
</style></head><body><div class="card">
    <div class="cap">Modal · alert dialog · non-closable variant</div>
    <div style="position:relative;background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-md);height:200px;overflow:hidden;">
      <div style="position:absolute;inset:0;background:rgba(6,7,10,0.72);backdrop-filter:blur(6px);"></div>
      <div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:84%;background:var(--bg-elevated);border:1px solid var(--border-default);border-radius:var(--radius-lg);box-shadow:0 12px 32px -6px rgba(0,0,0,0.6);padding:18px 20px;">
        <div style="font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-tertiary);margin-bottom:6px;">Unlock the full report</div>
        <div style="font-size:16px;font-weight:600;color:var(--text-primary);margin-bottom:4px;">We'll email you the signed report.</div>
        <div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px;">Tell us where to send it.</div>
        <input style="width:100%;padding:7px 10px;border-radius:var(--radius-md);border:1px solid var(--border-default);background:var(--bg-surface);color:var(--text-primary);font-size:13px;outline:none;" placeholder="you@company.com">
        <div style="display:flex;gap:8px;margin-top:10px;justify-content:flex-end;">
          <button style="padding:7px 12px;border-radius:var(--radius-md);background:var(--brand-primary);color:#0A0B0D;border:none;font-weight:500;font-size:13px;">Unlock report</button>
        </div>
      </div>
    </div>
    <div style="margin-top:10px;font-size:12px;color:var(--text-tertiary);line-height:1.5;">Scrim · rgba(6,7,10,0.72) · backdrop-blur 6px. Non-closable variant has no X, no Esc, no click-outside dismiss.</div>
  </div></body></html>
