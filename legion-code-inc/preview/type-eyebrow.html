<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  html,body{margin:0;padding:0;background:var(--bg-canvas);color:var(--text-primary);}
  .card{padding:22px 26px;}
  .cap{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-tertiary);margin-bottom:18px;display:flex;justify-content:space-between;align-items:baseline;}
  .cap b{color:var(--text-secondary);font-weight:500;}
  .stack{display:grid;gap:18px;}
  .eb-mono{font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-tertiary);}
  .eb-green{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--brand-primary);font-weight:600;}
  .h-section{font-size:24px;font-weight:600;letter-spacing:-0.01em;margin-top:6px;}
  .meta-row{font-family:var(--font-mono);font-size:12px;color:var(--text-tertiary);display:flex;gap:10px;flex-wrap:wrap;}
  .divider{border-top:1px solid var(--border-subtle);padding-top:14px;}
  .signed-meta{font-size:14px;color:var(--text-secondary);margin-top:6px;font-family:var(--font-mono);}
</style></head><body><div class="card">
  <div class="cap"><span>Eyebrow · caption · metadata</span><b>mono labels</b></div>
  <div class="stack">
    <div>
      <div class="eb-mono">01 / Finding</div>
      <div class="h-section">Section heading with mono eyebrow</div>
    </div>
    <div class="divider">
      <div class="eb-green">Signed</div>
      <div class="signed-meta">Ed25519 · public-key 4f8a…92c1</div>
    </div>
    <div class="meta-row divider">
      <span>2026-05-17 14:08 UTC</span><span>·</span><span>1.7s</span><span>·</span><span>1,247 files</span>
    </div>
  </div>
</div></body></html>
