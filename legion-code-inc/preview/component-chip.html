<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-sans);}
.card{padding:20px 24px;}
.cap{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-tertiary);margin-bottom:14px;}
</style></head><body><div class="card">
    <div class="cap">Chips · filter · selection</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;">
      <span style="padding:5px 10px 5px 10px;border-radius:9999px;background:var(--bg-elevated);border:1px solid var(--border-default);font-size:12px;color:var(--text-secondary);display:inline-flex;align-items:center;gap:6px;">All severities <span style="font-family:var(--font-mono);color:var(--text-tertiary);">10</span></span>
      <span style="padding:5px 10px 5px 10px;border-radius:9999px;background:var(--severity-critical-bg);border:1px solid transparent;font-size:12px;color:var(--severity-critical);display:inline-flex;align-items:center;gap:6px;font-weight:500;">Critical <span style="font-family:var(--font-mono);">2</span></span>
      <span style="padding:5px 10px;border-radius:9999px;background:var(--bg-elevated);border:1px solid var(--border-default);font-size:12px;color:var(--text-secondary);">Warning <span style="font-family:var(--font-mono);color:var(--text-tertiary);">5</span></span>
      <span style="padding:5px 10px;border-radius:9999px;background:var(--bg-elevated);border:1px solid var(--border-default);font-size:12px;color:var(--text-secondary);">Info <span style="font-family:var(--font-mono);color:var(--text-tertiary);">3</span></span>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;">
      <span style="padding:4px 9px 4px 10px;border-radius:9999px;background:var(--bg-elevated);border:1px solid var(--border-default);font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);display:inline-flex;align-items:center;gap:6px;">package.json <span style="cursor:pointer;color:var(--text-tertiary);">×</span></span><span style="padding:4px 9px 4px 10px;border-radius:9999px;background:var(--bg-elevated);border:1px solid var(--border-default);font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);display:inline-flex;align-items:center;gap:6px;">src/handlers <span style="cursor:pointer;color:var(--text-tertiary);">×</span></span><span style="padding:4px 9px 4px 10px;border-radius:9999px;background:var(--bg-elevated);border:1px solid var(--border-default);font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);display:inline-flex;align-items:center;gap:6px;">src/lib <span style="cursor:pointer;color:var(--text-tertiary);">×</span></span><span style="padding:4px 9px 4px 10px;border-radius:9999px;background:var(--bg-elevated);border:1px solid var(--border-default);font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);display:inline-flex;align-items:center;gap:6px;">logs <span style="cursor:pointer;color:var(--text-tertiary);">×</span></span><span style="padding:4px 9px 4px 10px;border-radius:9999px;background:var(--bg-elevated);border:1px solid var(--border-default);font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);display:inline-flex;align-items:center;gap:6px;">ci <span style="cursor:pointer;color:var(--text-tertiary);">×</span></span><span style="padding:4px 9px 4px 10px;border-radius:9999px;background:var(--bg-elevated);border:1px solid var(--border-default);font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);display:inline-flex;align-items:center;gap:6px;">.env.local <span style="cursor:pointer;color:var(--text-tertiary);">×</span></span>
    </div>
  </div></body></html>
