<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-sans);}
.card{padding:20px 24px;}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:stretch;}
.sw{flex:1;min-width:0;border-radius:var(--radius-md);border:1px solid var(--border-default);overflow:hidden;background:var(--bg-elevated);}
.sw-fill{height:64px;border-bottom:1px solid var(--border-subtle);}
.sw-meta{padding:8px 10px;}
.sw-name{font-family:var(--font-mono);font-size:11px;color:var(--text-primary);font-weight:500;}
.sw-hex{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);margin-top:2px;}
.cap{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-tertiary);margin-bottom:10px;}
</style></head><body><div class="card">
    <div class="cap">Borders &amp; dividers</div>
    <div class="row">
      <div class="sw" style="background:var(--bg-elevated)"><div style="height:72px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--border-subtle);"><div style="width:60%;height:36px;border-radius:6px;border:1px solid #1F2229;background:var(--bg-canvas)"></div></div><div class="sw-meta"><div class="sw-name">border.subtle</div><div class="sw-hex">#1F2229</div></div></div><div class="sw" style="background:var(--bg-elevated)"><div style="height:72px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--border-subtle);"><div style="width:60%;height:36px;border-radius:6px;border:1px solid #2A2E37;background:var(--bg-canvas)"></div></div><div class="sw-meta"><div class="sw-name">border.default</div><div class="sw-hex">#2A2E37</div></div></div><div class="sw" style="background:var(--bg-elevated)"><div style="height:72px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--border-subtle);"><div style="width:60%;height:36px;border-radius:6px;border:1px solid #3A3F4A;background:var(--bg-canvas)"></div></div><div class="sw-meta"><div class="sw-name">border.strong</div><div class="sw-hex">#3A3F4A</div></div></div>
    </div>
  </div></body></html>
