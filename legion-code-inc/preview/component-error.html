<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-sans);}
.card{padding:20px 24px;}
.cap{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-tertiary);margin-bottom:14px;}
</style></head><body><div class="card">
    <div class="cap">Error · state what happened and what to do</div>
    <div style="background:var(--bg-elevated);border:1px solid var(--border-default);border-radius:var(--radius-lg);padding:24px 22px;display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:flex-start;">
      <div style="width:36px;height:36px;border-radius:50%;background:var(--severity-critical-bg);display:flex;align-items:center;justify-content:center;">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2 L17 16 L1 16 Z" stroke="#FF4D5E" stroke-width="1.6" fill="none"/><path d="M9 7 V11" stroke="#FF4D5E" stroke-width="1.6" stroke-linecap="round"/><circle cx="9" cy="13.5" r="0.9" fill="#FF4D5E"/></svg>
      </div>
      <div>
        <div style="font-size:15px;font-weight:600;color:var(--text-primary);margin-bottom:4px;">Scan failed</div>
        <div style="font-size:13px;color:var(--text-secondary);line-height:1.55;margin-bottom:12px;">The repository is empty. Connect a repository with at least one commit so Legion has something to scan.</div>
        <div style="display:flex;gap:8px;">
          <button style="font-family:var(--font-sans);font-size:13px;font-weight:500;padding:7px 12px;border-radius:var(--radius-md);background:var(--bg-subtle);color:var(--text-primary);border:1px solid var(--border-default);cursor:pointer;">Choose a repository</button>
          <button style="font-family:var(--font-sans);font-size:13px;padding:7px 12px;border-radius:var(--radius-md);background:transparent;color:var(--text-secondary);border:none;cursor:pointer;">View docs</button>
        </div>
      </div>
    </div>
  </div></body></html>
