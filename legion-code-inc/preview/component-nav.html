<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-sans);}
.card{padding:20px 24px;}
.cap{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-tertiary);margin-bottom:14px;}
</style></head><body><div class="card">
    <div class="cap">Navigation · sidebar rail · breadcrumbs</div>
    <div style="display:grid;grid-template-columns:200px 1fr;gap:14px;">
      <div style="background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:10px;">
        <div style="display:flex;align-items:center;gap:8px;padding:6px 8px;margin-bottom:8px;border-bottom:1px solid var(--border-subtle);padding-bottom:10px;">
          <img src="../assets/logos/legion-symbol-dark.svg" style="height:18px;" alt="">
          <span style="font-family:var(--font-sans);font-weight:700;font-size:13px;letter-spacing:-0.03em;">LEGION</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px;padding:7px 9px;border-radius:var(--radius-sm);background:var(--bg-elevated);color:var(--text-primary);font-size:13px;margin-bottom:1px;">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="3" stroke="currentColor" stroke-width="1.4"/></svg>
          Scans
        </div><div style="display:flex;align-items:center;gap:10px;padding:7px 9px;border-radius:var(--radius-sm);color:var(--text-secondary);font-size:13px;margin-bottom:1px;">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="3" stroke="currentColor" stroke-width="1.4"/></svg>
          Findings
        </div><div style="display:flex;align-items:center;gap:10px;padding:7px 9px;border-radius:var(--radius-sm);color:var(--text-secondary);font-size:13px;margin-bottom:1px;">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="3" stroke="currentColor" stroke-width="1.4"/></svg>
          Repositories
        </div><div style="display:flex;align-items:center;gap:10px;padding:7px 9px;border-radius:var(--radius-sm);color:var(--text-secondary);font-size:13px;margin-bottom:1px;">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="3" stroke="currentColor" stroke-width="1.4"/></svg>
          Reports
        </div>
      </div>
      <div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary);display:flex;align-items:center;gap:6px;margin-bottom:14px;">
          <a style="color:var(--text-secondary);text-decoration:none;">Scans</a>
          <span>/</span>
          <a style="color:var(--text-secondary);text-decoration:none;">acme/checkout</a>
          <span>/</span>
          <span style="color:var(--text-primary);">3a7f1bc</span>
        </div>
        <div style="display:flex;gap:0;border-bottom:1px solid var(--border-default);">
          <div style="padding:9px 14px;font-size:13px;font-weight:500;color:var(--text-primary);border-bottom:2px solid var(--text-primary);margin-bottom:-1px;">Findings</div>
          <div style="padding:9px 14px;font-size:13px;color:var(--text-secondary);">Evidence</div>
          <div style="padding:9px 14px;font-size:13px;color:var(--text-secondary);">Signature</div>
        </div>
      </div>
    </div>
  </div></body></html>
