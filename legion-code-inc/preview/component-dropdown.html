<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-sans);}
.card{padding:20px 24px;}
.cap{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-tertiary);margin-bottom:14px;}
</style></head><body><div class="card">
    <div class="cap">Dropdown · context · select menu</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div style="background:var(--bg-elevated);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:6px;width:fit-content;box-shadow:0 12px 32px -6px rgba(0,0,0,0.6);">
        <div style="padding:5px 12px 5px 10px;font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-tertiary);">SCAN ACTIONS</div>
        <div style="display:flex;align-items:center;gap:10px;padding:7px 12px 7px 10px;border-radius:var(--radius-sm);background:var(--bg-subtle);font-size:13px;color:var(--text-primary);min-width:200px;">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7 L6 11 L12 3" stroke="#A1A8B3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Re-scan this commit
          <span style="margin-left:auto;font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);">⌘R</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px;padding:7px 12px 7px 10px;border-radius:var(--radius-sm);font-size:13px;color:var(--text-secondary);">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2 V10 M3 6 L7 10 L11 6" stroke="#A1A8B3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Download signed JSON
        </div>
        <div style="display:flex;align-items:center;gap:10px;padding:7px 12px 7px 10px;border-radius:var(--radius-sm);font-size:13px;color:var(--text-secondary);">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="3" y="3" width="8" height="8" rx="1.5" stroke="#A1A8B3" stroke-width="1.5"/></svg>
          Copy share link
        </div>
        <div style="height:1px;background:var(--border-subtle);margin:4px 0;"></div>
        <div style="display:flex;align-items:center;gap:10px;padding:7px 12px 7px 10px;border-radius:var(--radius-sm);font-size:13px;color:var(--severity-critical);">
          Delete scan
        </div>
      </div>

      <div style="background:var(--bg-elevated);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:6px;width:fit-content;height:fit-content;box-shadow:0 12px 32px -6px rgba(0,0,0,0.6);">
        <div style="padding:5px 12px 5px 10px;font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-tertiary);">SCAN TYPE</div>
        <div style="display:flex;align-items:center;gap:10px;padding:7px 12px 7px 10px;border-radius:var(--radius-sm);background:var(--bg-subtle);font-size:13px;color:var(--text-primary);min-width:180px;">
          <span style="width:8px;height:8px;border-radius:50%;background:var(--brand-primary);"></span>
          Quick Scan
          <span style="margin-left:auto;font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);">FREE</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px;padding:7px 12px 7px 10px;border-radius:var(--radius-sm);font-size:13px;color:var(--text-secondary);">
          <span style="width:8px;height:8px;border-radius:50%;border:1px solid var(--border-strong);"></span>
          Deep Audit
          <span style="margin-left:auto;font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);">$249</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px;padding:7px 12px 7px 10px;border-radius:var(--radius-sm);font-size:13px;color:var(--text-secondary);">
          <span style="width:8px;height:8px;border-radius:50%;border:1px solid var(--border-strong);"></span>
          Codebase Atlas
          <span style="margin-left:auto;font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);">$499</span>
        </div>
      </div>
    </div>
  </div></body></html>
