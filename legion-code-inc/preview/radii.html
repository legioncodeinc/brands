<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0;background:var(--bg-canvas);color:var(--text-primary);}
.card{padding:20px 24px;}
.cap{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-tertiary);margin-bottom:14px;}
.row{display:grid;grid-template-columns:90px 1fr auto;gap:16px;align-items:baseline;padding:10px 0;border-bottom:1px solid var(--border-subtle);}
.row:last-child{border-bottom:none;}
.tok{font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary);}
.spec{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);text-align:right;}
</style></head><body><div class="card">
    <div class="cap">Radii</div>
    <div style="display:flex;gap:14px;">
      <div style="text-align:center;">
        <div style="width:64px;height:64px;background:var(--bg-elevated);border:1px solid var(--border-default);border-radius:4px;margin:0 auto 8px;"></div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-primary);">radius.sm</div>
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);">4</div>
      </div><div style="text-align:center;">
        <div style="width:64px;height:64px;background:var(--bg-elevated);border:1px solid var(--border-default);border-radius:8px;margin:0 auto 8px;"></div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-primary);">radius.md</div>
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);">8</div>
      </div><div style="text-align:center;">
        <div style="width:64px;height:64px;background:var(--bg-elevated);border:1px solid var(--border-default);border-radius:12px;margin:0 auto 8px;"></div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-primary);">radius.lg</div>
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);">12</div>
      </div><div style="text-align:center;">
        <div style="width:64px;height:64px;background:var(--bg-elevated);border:1px solid var(--border-default);border-radius:16px;margin:0 auto 8px;"></div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-primary);">radius.xl</div>
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);">16</div>
      </div><div style="text-align:center;">
        <div style="width:64px;height:64px;background:var(--bg-elevated);border:1px solid var(--border-default);border-radius:9999px;margin:0 auto 8px;"></div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-primary);">radius.full</div>
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);">∞</div>
      </div>
    </div>
  </div></body></html>
