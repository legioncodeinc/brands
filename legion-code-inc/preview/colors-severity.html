<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-sans);}
.card{padding:20px 24px;}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:stretch;}
.sw{flex:1;min-width:0;border-radius:var(--radius-md);border:1px solid var(--border-default);overflow:hidden;background:var(--bg-elevated);}
.sw-fill{height:64px;border-bottom:1px solid var(--border-subtle);}
.sw-meta{padding:8px 10px;}
.sw-name{font-family:var(--font-mono);font-size:11px;color:var(--text-primary);font-weight:500;}
.sw-hex{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);margin-top:2px;}
.cap{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-tertiary);margin-bottom:10px;}
</style></head><body><div class="card">
    <div class="cap">Severity · semantic, never decorative</div>
    <div class="row">
      <div class="sw"><div class="sw-fill" style="background:#FF4D5E;position:relative;"><div style="position:absolute;left:8px;bottom:8px;padding:4px 8px;border-radius:var(--radius-sm);background:rgba(255,77,94,0.12);color:#FF4D5E;font-family:var(--font-mono);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;">critical</div></div><div class="sw-meta"><div class="sw-name">severity.critical</div><div class="sw-hex">#FF4D5E</div></div></div><div class="sw"><div class="sw-fill" style="background:#FFB02E;position:relative;"><div style="position:absolute;left:8px;bottom:8px;padding:4px 8px;border-radius:var(--radius-sm);background:rgba(255,176,46,0.12);color:#FFB02E;font-family:var(--font-mono);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;">warning</div></div><div class="sw-meta"><div class="sw-name">severity.warning</div><div class="sw-hex">#FFB02E</div></div></div><div class="sw"><div class="sw-fill" style="background:#5B8AFF;position:relative;"><div style="position:absolute;left:8px;bottom:8px;padding:4px 8px;border-radius:var(--radius-sm);background:rgba(91,138,255,0.12);color:#5B8AFF;font-family:var(--font-mono);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;">info</div></div><div class="sw-meta"><div class="sw-name">severity.info</div><div class="sw-hex">#5B8AFF</div></div></div><div class="sw"><div class="sw-fill" style="background:#3DDC97;position:relative;"><div style="position:absolute;left:8px;bottom:8px;padding:4px 8px;border-radius:var(--radius-sm);background:rgba(61,220,151,0.12);color:#3DDC97;font-family:var(--font-mono);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;">success</div></div><div class="sw-meta"><div class="sw-name">severity.success</div><div class="sw-hex">#3DDC97</div></div></div>
    </div>
  </div></body></html>
