<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-sans);}
.card{padding:20px 24px;}
.cap{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-tertiary);margin-bottom:14px;}
</style></head><body><div class="card">
    <div class="cap">Empty state · forward-looking</div>
    <div style="background:var(--bg-elevated);border:1px solid var(--border-default);border-radius:var(--radius-lg);padding:36px 28px;text-align:center;">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" style="margin:0 auto 14px;display:block;">
        <rect x="8" y="8" width="32" height="32" rx="6" stroke="#3A3F4A" stroke-width="1.5" fill="none"/>
        <path d="M16 24 H32" stroke="#3A3F4A" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M16 18 H28" stroke="#3A3F4A" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M16 30 H22" stroke="#3A3F4A" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <div style="font-size:15px;font-weight:600;color:var(--text-primary);margin-bottom:4px;">No scans yet.</div>
      <div style="font-size:13px;color:var(--text-secondary);margin-bottom:14px;">Connect a GitHub repository to start.</div>
      <button style="font-family:var(--font-sans);font-size:13px;font-weight:500;padding:8px 14px;border-radius:var(--radius-md);background:var(--brand-primary);color:#0A0B0D;border:none;cursor:pointer;">
        Connect GitHub
      </button>
    </div>
  </div></body></html>
