<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-sans);}
.card{padding:20px 24px;}
.cap{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-tertiary);margin-bottom:14px;}
</style></head><body><div class="card">
    <div class="cap">Findings table</div>
    <div style="border:1px solid var(--border-default);border-radius:var(--radius-md);overflow:hidden;">
      <div style="display:grid;grid-template-columns:90px 1fr 200px 80px;gap:14px;padding:9px 14px;background:var(--bg-elevated);border-bottom:1px solid var(--border-default);font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-tertiary);">
        <div>Severity</div><div>Finding</div><div>Coordinate</div><div style="text-align:right;">Action</div>
      </div>
      <div style="display:grid;grid-template-columns:90px 1fr 200px 80px;gap:14px;padding:10px 14px;border-bottom:1px solid var(--border-subtle);align-items:center;">
        <span style="display:inline-block;padding:2px 6px;border-radius:var(--radius-sm);background:var(--severity-critical-bg);color:var(--severity-critical);font-family:var(--font-mono);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;width:fit-content;">Critical</span>
        <span style="font-size:13px;color:var(--text-primary);">PAN found in plain text</span>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);">src/handlers/webhook.ts:142</span>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary);text-align:right;">Fix first →</span>
      </div><div style="display:grid;grid-template-columns:90px 1fr 200px 80px;gap:14px;padding:10px 14px;border-bottom:1px solid var(--border-subtle);align-items:center;">
        <span style="display:inline-block;padding:2px 6px;border-radius:var(--radius-sm);background:var(--severity-critical-bg);color:var(--severity-critical);font-family:var(--font-mono);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;width:fit-content;">Critical</span>
        <span style="font-size:13px;color:var(--text-primary);">Stripe secret in git history</span>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);">.env.local:3</span>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary);text-align:right;">Rotate now →</span>
      </div><div style="display:grid;grid-template-columns:90px 1fr 200px 80px;gap:14px;padding:10px 14px;border-bottom:1px solid var(--border-subtle);align-items:center;">
        <span style="display:inline-block;padding:2px 6px;border-radius:var(--radius-sm);background:var(--severity-warning-bg);color:var(--severity-warning);font-family:var(--font-mono);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;width:fit-content;">Warning</span>
        <span style="font-size:13px;color:var(--text-primary);">CVE in axios@0.21.1</span>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);">package.json:18</span>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary);text-align:right;">Upgrade →</span>
      </div><div style="display:grid;grid-template-columns:90px 1fr 200px 80px;gap:14px;padding:10px 14px;border-bottom:1px solid var(--border-subtle);align-items:center;">
        <span style="display:inline-block;padding:2px 6px;border-radius:var(--radius-sm);background:var(--severity-info-bg);color:var(--severity-info);font-family:var(--font-mono);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;width:fit-content;">Info</span>
        <span style="font-size:13px;color:var(--text-primary);">Dependency 2 majors behind</span>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);">package.json:22</span>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary);text-align:right;">Track →</span>
      </div>
    </div>
  </div></body></html>
