<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0;background:var(--bg-canvas);color:var(--text-primary);}
.card{padding:20px 24px;}
.cap{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-tertiary);margin-bottom:14px;}
.grid{display:grid;gap:10px;}
.tile{background:var(--bg-elevated);border:1px solid var(--border-default);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;padding:18px;min-height:104px;}
.tile.light{background:#F4F5F7;}
.lbl{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);text-align:center;margin-top:6px;}
</style></head><body><div class="card">
    <div class="cap">Lockups · dark + light</div>
    <div class="grid" style="grid-template-columns:1fr 1fr;">
      <div>
        <div class="tile"><img src="../assets/logos/legion-logo-dark.svg" style="height:36px;" alt=""></div>
        <div class="lbl">legion-logo-dark.svg</div>
      </div>
      <div>
        <div class="tile light"><img src="../assets/logos/legion-logo-light.svg" style="height:36px;" alt=""></div>
        <div class="lbl">legion-logo-light.svg</div>
      </div>
      <div>
        <div class="tile"><img src="../assets/logos/legion-wordmark-dark.svg" style="height:24px;" alt=""></div>
        <div class="lbl">legion-wordmark-dark.svg</div>
      </div>
      <div>
        <div class="tile light"><img src="../assets/logos/legion-wordmark-light.svg" style="height:24px;" alt=""></div>
        <div class="lbl">legion-wordmark-light.svg</div>
      </div>
    </div>
  </div></body></html>
