<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0;background:var(--bg-canvas);color:var(--text-primary);}
.card{padding:20px 24px;}
.cap{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-tertiary);margin-bottom:14px;}
.grid{display:grid;gap:10px;}
.tile{background:var(--bg-elevated);border:1px solid var(--border-default);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;padding:18px;min-height:104px;}
.tile.light{background:#F4F5F7;}
.lbl{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);text-align:center;margin-top:6px;}
</style></head><body><div class="card">
    <div class="cap">Icon family · rounded · sharp · mono</div>
    <div class="grid" style="grid-template-columns:repeat(6,1fr);gap:8px;">
      <div><div class="tile" style="min-height:84px;"><img src="../assets/logos/legion-icon-rounded-dark.svg" style="height:60px;" alt=""></div><div class="lbl">rounded-dark</div></div>
      <div><div class="tile light" style="min-height:84px;"><img src="../assets/logos/legion-icon-rounded-light.svg" style="height:60px;" alt=""></div><div class="lbl">rounded-light</div></div>
      <div><div class="tile" style="min-height:84px;"><img src="../assets/logos/legion-icon-green-dark.svg" style="height:60px;" alt=""></div><div class="lbl">green-dark</div></div>
      <div><div class="tile" style="min-height:84px;"><img src="../assets/logos/legion-icon-green-light.svg" style="height:60px;" alt=""></div><div class="lbl">green-light</div></div>
      <div><div class="tile" style="min-height:84px;"><img src="../assets/logos/legion-icon-green-dark-sharp.svg" style="height:60px;" alt=""></div><div class="lbl">green-sharp</div></div>
      <div><div class="tile" style="min-height:84px;"><img src="../assets/logos/legion-icon-mono-green.svg" style="height:60px;" alt=""></div><div class="lbl">mono-green</div></div>
    </div>
  </div></body></html>
