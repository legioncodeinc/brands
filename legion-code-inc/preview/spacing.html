<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0;background:var(--bg-canvas);color:var(--text-primary);}
.card{padding:20px 24px;}
.cap{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-tertiary);margin-bottom:14px;}
.row{display:grid;grid-template-columns:90px 1fr auto;gap:16px;align-items:baseline;padding:10px 0;border-bottom:1px solid var(--border-subtle);}
.row:last-child{border-bottom:none;}
.tok{font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary);}
.spec{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);text-align:right;}
</style></head><body><div class="card">
    <div class="cap">Spacing · 4 px base</div>
    <div style="display:flex;align-items:flex-end;gap:14px;padding-bottom:8px;">
      <div style="text-align:center;">
        <div style="width:4px;height:80px;background:var(--brand-primary);border-radius:2px;margin:0 auto 8px;"></div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-primary);">space.1</div>
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);">4</div>
      </div><div style="text-align:center;">
        <div style="width:8px;height:80px;background:var(--brand-primary);border-radius:2px;margin:0 auto 8px;"></div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-primary);">space.2</div>
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);">8</div>
      </div><div style="text-align:center;">
        <div style="width:12px;height:80px;background:var(--brand-primary);border-radius:2px;margin:0 auto 8px;"></div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-primary);">space.3</div>
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);">12</div>
      </div><div style="text-align:center;">
        <div style="width:16px;height:80px;background:var(--brand-primary);border-radius:2px;margin:0 auto 8px;"></div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-primary);">space.4</div>
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);">16</div>
      </div><div style="text-align:center;">
        <div style="width:24px;height:80px;background:var(--brand-primary);border-radius:2px;margin:0 auto 8px;"></div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-primary);">space.6</div>
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);">24</div>
      </div><div style="text-align:center;">
        <div style="width:32px;height:80px;background:var(--brand-primary);border-radius:2px;margin:0 auto 8px;"></div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-primary);">space.8</div>
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);">32</div>
      </div><div style="text-align:center;">
        <div style="width:48px;height:80px;background:var(--brand-primary);border-radius:2px;margin:0 auto 8px;"></div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-primary);">space.12</div>
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);">48</div>
      </div><div style="text-align:center;">
        <div style="width:64px;height:80px;background:var(--brand-primary);border-radius:2px;margin:0 auto 8px;"></div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-primary);">space.16</div>
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);">64</div>
      </div>
    </div>
  </div></body></html>
