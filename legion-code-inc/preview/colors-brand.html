<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-sans);}
.card{padding:20px 24px;}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:stretch;}
.sw{flex:1;min-width:0;border-radius:var(--radius-md);border:1px solid var(--border-default);overflow:hidden;background:var(--bg-elevated);}
.sw-fill{height:64px;border-bottom:1px solid var(--border-subtle);}
.sw-meta{padding:8px 10px;}
.sw-name{font-family:var(--font-mono);font-size:11px;color:var(--text-primary);font-weight:500;}
.sw-hex{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);margin-top:2px;}
.cap{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-tertiary);margin-bottom:10px;}
</style></head><body><div class="card">
    <div class="cap">Brand · verified-green · scarce</div>
    <div class="row">
      <div class="sw"><div class="sw-fill" style="background:#3DDC97"></div><div class="sw-meta"><div class="sw-name">brand.primary</div><div class="sw-hex">#3DDC97 · verified</div></div></div>
      <div class="sw"><div class="sw-fill" style="background:#2EC585"></div><div class="sw-meta"><div class="sw-name">brand.primary-hover</div><div class="sw-hex">#2EC585</div></div></div>
      <div class="sw"><div class="sw-fill" style="background:#22A26D"></div><div class="sw-meta"><div class="sw-name">brand.primary-pressed</div><div class="sw-hex">#22A26D</div></div></div>
      <div class="sw"><div class="sw-fill" style="background:rgba(61,220,151,0.12);display:flex;align-items:center;justify-content:center;color:#3DDC97;font-family:var(--font-mono);font-size:11px;">subtle tint</div><div class="sw-meta"><div class="sw-name">brand.primary-subtle</div><div class="sw-hex">rgba .., 0.12</div></div></div>
    </div>
    <div style="margin-top:14px;padding:10px 12px;background:var(--bg-elevated);border:1px solid var(--border-default);border-radius:var(--radius-md);font-size:12px;color:var(--text-secondary);line-height:1.5;">
      <span style="color:var(--brand-primary);font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;">Scarcity rule</span> · #3DDC97 appears no more than once per visible region. The brand IS the success state — over-using dilutes it.
    </div>
  </div></body></html>
