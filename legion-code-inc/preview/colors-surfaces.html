<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-sans);}
.card{padding:20px 24px;}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:stretch;}
.sw{flex:1;min-width:0;border-radius:var(--radius-md);border:1px solid var(--border-default);overflow:hidden;background:var(--bg-elevated);}
.sw-fill{height:64px;border-bottom:1px solid var(--border-subtle);}
.sw-meta{padding:8px 10px;}
.sw-name{font-family:var(--font-mono);font-size:11px;color:var(--text-primary);font-weight:500;}
.sw-hex{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);margin-top:2px;}
.cap{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-tertiary);margin-bottom:10px;}
</style></head><body><div class="card">
    <div class="cap">Surfaces · dark theme · primary</div>
    <div class="row">
      <div class="sw"><div class="sw-fill" style="background:#0A0B0D"></div><div class="sw-meta"><div class="sw-name">bg.canvas</div><div class="sw-hex">#0A0B0D</div></div></div>
      <div class="sw"><div class="sw-fill" style="background:#13151A"></div><div class="sw-meta"><div class="sw-name">bg.surface</div><div class="sw-hex">#13151A</div></div></div>
      <div class="sw"><div class="sw-fill" style="background:#1C1F26"></div><div class="sw-meta"><div class="sw-name">bg.elevated</div><div class="sw-hex">#1C1F26</div></div></div>
      <div class="sw"><div class="sw-fill" style="background:#242831"></div><div class="sw-meta"><div class="sw-name">bg.subtle</div><div class="sw-hex">#242831</div></div></div>
      <div class="sw"><div class="sw-fill" style="background:#06070A"></div><div class="sw-meta"><div class="sw-name">bg.inset</div><div class="sw-hex">#06070A</div></div></div>
    </div>
  </div></body></html>
